<!doctype html><html lang="hi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="common.js"></script></head><body><div class="top"><div class="row"><b>GK BY PURUSHOTAM SIR</b><div><button class="btn light" onclick="tab('today')">Today</button><button class="btn light" onclick="tab('schedule')">90 Days</button><button class="btn light" onclick="tab('tests')">Tests</button><button class="btn red" onclick="logout()">Logout</button></div></div></div><main class="container"><section id="today"><div id="todayBox"></div></section><section id="schedule" class="hidden"><h2>90 Days Schedule</h2><div id="scheduleList" class="list"></div></section><section id="tests" class="hidden"><h2>Tests</h2><div id="testsList" class="list"></div></section></main><script>
let user;function tab(n){['today','schedule','tests'].forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==n))}
async function load(){user=await requireAuth();if(!user)return;await Promise.all([loadToday(),loadSchedule(),loadTests()])}
async function loadToday(){const today=new Date().toISOString().slice(0,10);const {data:d}=await sb.from('schedule_days').select('*').eq('day_date',today).maybeSingle();if(!d){todayBox.innerHTML='<div class="card">ý§Üý§ú ý§ïý§æ schedule ý§âý§™ý§≤ý§¨ý•çý§ß ý§®ý§πý•Äý§Ç ý§πý•àý•§</div>';return}const {data:t=[]}=await sb.from('daily_targets').select('*').eq('schedule_day_id',d.id).order('target_order');todayBox.innerHTML='<div class="card"><h2>Day '+d.day_number+' ‚Äî '+esc(d.phase||'')+'</h2>'+t.map(x=>'<div class="target"><b>'+esc(x.subject)+':</b> '+esc(x.topic)+'</div>').join('')+'</div>'}
async function loadSchedule(){const {data:d=[]}=await sb.from('schedule_days').select('*').order('day_number');const {data:t=[]}=await sb.from('daily_targets').select('*').order('target_order');const g={};t.forEach(x=>(g[x.schedule_day_id]??=[]).push(x));scheduleList.innerHTML=d.map(x=>'<div class="card"><b>Day '+x.day_number+' ‚Äî '+fmtDate(x.day_date)+'</b>'+(g[x.id]||[]).map(y=>'<div class="target"><b>'+esc(y.subject)+':</b> '+esc(y.topic)+'</div>').join('')+'</div>').join('')}
async function loadTests(){const {data:t=[]}=await sb.from('tests').select('*').eq('status','published').order('created_at',{ascending:false});testsList.innerHTML=t.length?t.map(x=>'<div class="item row"><div><b>'+esc(x.title)+'</b><div class="muted">'+x.total_questions+' Questions</div></div><a class="btn green" href="test.html?id='+x.id+'">Start Test</a></div>').join(''):'<div class="card">ý§Öý§≠ý•Ä ý§ïý•ãý§à Published Test ý§®ý§πý•Äý§Ç ý§πý•àý•§</div>'}
load();
</script></body></html>
