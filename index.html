<!doctype html><html lang="hi"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071f3d"><link rel="manifest" href="manifest.webmanifest">
<title>GK BY PURUSHOTAM SIR | GROUP D 6 MONTHS TARGET BATCH</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script><script src="common.js"></script>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
</head><body>
<div class="auth-premium-bg"><div class="auth-premium-card">
  <div class="auth-logo-orb">GK</div>
  <h1>GK BY PURUSHOTAM SIR</h1>
  <div class="auth-batch">GROUP D 6 MONTHS TARGET BATCH</div>
  <div id="msg"></div>

  <section id="loginMode">
    <div class="form-group"><label>Email या पुराना Mobile Number</label><input id="loginId" autocomplete="username" placeholder="Email या 10 अंकों का मोबाइल नंबर"></div>
    <div class="form-group"><label>Password</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="अपना Password"></div>
    <button class="btn btn-blue auth-main-btn premium-press-btn" onclick="login()">Login</button>
    <button class="auth-link-btn" onclick="showForgot()">Password भूल गए? Email से Reset करें</button>
    <button class="btn btn-light auth-main-btn premium-press-btn" onclick="showRegister()">New Student Registration</button><button id="loginInstallBtn" class="btn btn-purple auth-main-btn premium-press-btn hidden" onclick="installApp()">⬇ Install App</button>
  </section>

  <section id="registerMode" class="hidden">
    <div class="form-group"><label>विद्यार्थी का नाम</label><input id="regName" placeholder="पूरा नाम"></div>
    <div class="form-group"><label>Email</label><input id="regEmail" type="email" autocomplete="email" placeholder="अपना Email"></div>
    <div class="form-group"><label>मोबाइल नंबर (Optional)</label><input id="regPhone" inputmode="numeric" maxlength="10" placeholder="10 अंकों का मोबाइल नंबर"></div>
    <div class="form-group"><label>Password</label><input id="regPassword" type="password" autocomplete="new-password" placeholder="कम से कम 6 अक्षर"></div>
    <div class="form-group"><label>Password दोबारा</label><input id="regPassword2" type="password" autocomplete="new-password" placeholder="Password दोबारा लिखें"></div>
    <button class="btn btn-green auth-main-btn premium-press-btn" onclick="signup()">Register</button>
    <button class="auth-link-btn" onclick="showLogin()">← Back to Login</button>
  </section>

  <section id="forgotMode" class="hidden">
    <div class="otp-icon">📧</div><h2>Password Reset</h2>
    <p class="muted">Registered Email डालिए। Password reset link आपके Email पर भेजा जाएगा।</p>
    <div class="form-group"><label>Registered Email</label><input id="forgotEmail" type="email" autocomplete="email" placeholder="your@email.com"></div>
    <button class="btn btn-blue auth-main-btn premium-press-btn" onclick="sendResetEmail()">Send Reset Link</button>
    <button class="auth-link-btn" onclick="showLogin()">← Back to Login</button>
  </section>

  <section id="newPasswordMode" class="hidden">
    <div class="otp-icon">✅</div><h2>नया Password बनाइए</h2>
    <p class="muted">Reset link verified है। अब नया password सेट करें।</p>
    <div class="form-group"><label>नया Password</label><input id="newPassword" type="password" minlength="6" autocomplete="new-password" placeholder="कम से कम 6 अक्षर"></div>
    <div class="form-group"><label>दोबारा Password</label><input id="newPassword2" type="password" minlength="6" autocomplete="new-password" placeholder="नया Password दोबारा"></div>
    <button class="btn btn-green auth-main-btn premium-press-btn" onclick="saveNewPassword()">Update Password</button>
  </section>
</div></div>

<script>
registerSW();initInstallUI('loginInstallBtn');
const authSections=["loginMode","registerMode","forgotMode","newPasswordMode"];

function showSection(id){
  msg.innerHTML="";
  authSections.forEach(x=>document.getElementById(x).classList.toggle("hidden",x!==id));
}
function showLogin(){showSection("loginMode")}
function showRegister(){showSection("registerMode")}
function showForgot(){showSection("forgotMode")}
function showMsg(text,type="error"){msg.innerHTML='<div class="notice notice-'+type+'">'+esc(text)+'</div>'}
function validEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v||"").trim())}

sb.auth.onAuthStateChange((event,session)=>{
  if(event==="PASSWORD_RECOVERY"){
    showSection("newPasswordMode");
    showMsg("Reset link verified. नया Password बनाइए।","success");
  }
});

(async()=>{
  const params=new URLSearchParams(location.search);
  const {data:{session}}=await sb.auth.getSession();
  if(params.get("reset")==="1" && session){
    showSection("newPasswordMode");
    return;
  }
  if(session){
    const p=await getProfile(session.user.id);
    location.href=p?.role==="admin"?"owner-control-gk-7x29.html":"student.html";
  }
})();

async function login(){
  msg.innerHTML="";
  const raw=loginId.value.trim();
  const password=loginPassword.value;
  if(!raw)return showMsg("Email या Mobile Number लिखें।");
  if(!password)return showMsg("Password लिखें।");

  let result;
  if(validEmail(raw)){
    result=await sb.auth.signInWithPassword({email:raw.toLowerCase(),password});
  }else{
    const phone=normalizeIndianPhone(raw);
    if(!phone)return showMsg("सही Email या 10 अंकों का Mobile Number लिखें।");
    // Backward compatibility for old synthetic-email mobile accounts.
    result=await sb.auth.signInWithPassword({email:phoneToAuthEmail(phone),password});
  }
  if(result.error)return showMsg("Login details गलत हैं।");
  const p=await getProfile(result.data.user.id);
  location.href=p?.role==="admin"?"owner-control-gk-7x29.html":"student.html";
}

async function signup(){
  msg.innerHTML="";
  const name=regName.value.trim();
  const email=regEmail.value.trim().toLowerCase();
  const phoneRaw=regPhone.value.trim();
  const phone=phoneRaw?normalizeIndianPhone(phoneRaw):null;
  const password=regPassword.value;

  if(name.length<2)return showMsg("विद्यार्थी का पूरा नाम लिखें।");
  if(!validEmail(email))return showMsg("सही Email ID लिखें।");
  if(phoneRaw && !phone)return showMsg("मोबाइल नंबर सही 10 अंकों का लिखें या खाली छोड़ें।");
  if(password.length<6)return showMsg("Password कम से कम 6 अक्षर का रखें।");
  if(password!==regPassword2.value)return showMsg("दोनों Password एक जैसे नहीं हैं।");

  const btn=document.querySelector('#registerMode .btn-green');
  const oldText=btn?btn.textContent:"Register";
  if(btn){btn.disabled=true;btn.textContent="Registering...";}

  try{
    let existing=null;
    try{
      const filters=[`email.eq.${email}`];
      if(phone)filters.push(`phone.eq.${phone}`);
      const q=await sb.from('profiles').select('id,email,phone').or(filters.join(',')).limit(1);
      if(!q.error && q.data && q.data.length) existing=q.data[0];
    }catch(_){}

    if(existing){
      return showMsg(
        existing.email===email
          ?"इस Email ID से पहले ही Registration हो चुका है। कृपया Login करें या Forgot Password का उपयोग करें।"
          :"इस Mobile Number से पहले ही Registration हो चुका है। कृपया Login करें।"
      );
    }

    const {data,error}=await sb.auth.signUp({
      email,
      password,
      options:{
        data:{full_name:name,phone:phone||null,auth_mode:"email"},
        emailRedirectTo:location.origin+location.pathname.replace(/[^/]+$/,"index.html")
      }
    });

    if(error){
      const m=(error.message||"").toLowerCase();
      if(m.includes("already")||m.includes("registered")||m.includes("user already exists")){
        return showMsg("इस Email ID से पहले ही Registration हो चुका है। कृपया Login करें या Forgot Password का उपयोग करें।");
      }
      if(m.includes("password")) return showMsg("Password स्वीकार नहीं हुआ। कम से कम 6 अक्षर का मजबूत Password रखें।");
      if(m.includes("email")) return showMsg("Email ID स्वीकार नहीं हुई। कृपया सही Email लिखें।");
      return showMsg("Registration नहीं हो पाया: "+error.message);
    }

    if(data?.user && Array.isArray(data.user.identities) && data.user.identities.length===0){
      return showMsg("इस Email ID से पहले ही Registration हो चुका है। कृपया Login करें या Forgot Password का उपयोग करें।");
    }

    if(data?.session){
      showMsg("Registration सफल। Dashboard खुल रहा है…","success");
      setTimeout(()=>location.href="student.html",800);
    }else{
      showMsg("Registration सफल। अपने Email में confirmation link खोलें, फिर Login करें।","success");
      regName.value="";regEmail.value="";regPhone.value="";regPassword.value="";regPassword2.value="";
    }
  }catch(err){
    console.error(err);
    showMsg("Registration के दौरान समस्या आई। Internet connection check करके दोबारा प्रयास करें।");
  }finally{
    if(btn){btn.disabled=false;btn.textContent=oldText;}
  }
}

async function sendResetEmail(){
  msg.innerHTML="";
  const email=forgotEmail.value.trim().toLowerCase();
  if(!validEmail(email))return showMsg("सही Registered Email लिखें।");
  const base=location.origin+location.pathname.replace(/[^/]+$/,"index.html");
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:base+"?reset=1"});
  if(error)return showMsg(error.message);
  showMsg("Password reset link आपके Email पर भेज दिया गया है। Inbox और Spam दोनों check करें।","success");
}

async function saveNewPassword(){
  const p1=newPassword.value,p2=newPassword2.value;
  if(p1.length<6)return showMsg("Password कम से कम 6 अक्षर का रखें।");
  if(p1!==p2)return showMsg("दोनों Password एक जैसे नहीं हैं।");
  const {error}=await sb.auth.updateUser({password:p1});
  if(error)return showMsg(error.message);
  await sb.auth.signOut();
  showLogin();
  showMsg("Password सफलतापूर्वक बदल गया। अब Login करें।","success");
}
</script>
</body></html>
