<!doctype html><html lang="hi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="common.js"></script></head><body><div class="container" style="max-width:430px;padding-top:10vh"><div class="card"><h1>GROUP D 90 DAYS TARGET BATCH</h1><p class="muted">GK BY PURUSHOTAM SIR</p><div id="msg"></div><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button class="btn blue" style="width:100%" onclick="login()">Login</button><br><br><button class="btn light" style="width:100%" onclick="signup()">New Student Registration</button></div></div><script>
async function login(){const {data,error}=await sb.auth.signInWithPassword({email:email.value.trim(),password:password.value});if(error){msg.textContent=error.message;return}const p=await getProfile(data.user.id);location.href=p?.role==='admin'?'admin.html':'student.html'}
async function signup(){const name=prompt('विद्यार्थी का पूरा नाम');const {error}=await sb.auth.signUp({email:email.value.trim(),password:password.value,options:{data:{full_name:name||''}}});msg.textContent=error?error.message:'Registration हो गया। अब Login करें।'}
</script></body></html>
