<!doctype html><html lang="hi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="common.js"></script></head><body><div class="top row"><b id="title">Mock Test</b><span id="timer"></span></div><main class="container"><div class="testgrid"><div class="card"><div id="qbox">Loading...</div><div class="nav4"><button class="btn blue" onclick="prev()">Previous</button><button class="btn orange" onclick="skip()">Skip</button><button class="btn green" onclick="next()">Next</button><button class="btn red" onclick="submitTest()">Submit</button></div></div><div class="card"><h3>Status</h3><div id="pal" class="palette"></div></div></div><div id="result"></div></main><script>
let user,test,qs=[],attempt,idx=0,ans={},st={};const id=new URLSearchParams(location.search).get('id');
function render(){const q=qs[idx];if(!q)return;title.textContent=test.title;let h='<h3>Q '+(idx+1)+'/'+qs.length+'</h3><h2>'+esc(q.question_text)+'</h2>';if(Array.isArray(q.statements))h+='<ol>'+q.statements.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ol>';if(q.assertion_text)h+='<p><b>अभिकथन:</b> '+esc(q.assertion_text)+'</p>';if(q.reason_text)h+='<p><b>कारण:</b> '+esc(q.reason_text)+'</p>';const o=Array.isArray(q.options)?q.options:[];h+=o.map((x,i)=>'<button class="option '+(ans[q.id]===i?'selected':'')+'" onclick="choose('+i+')">'+String.fromCharCode(65+i)+'. '+esc(typeof x==='string'?x:JSON.stringify(x))+'</button>').join('');qbox.innerHTML=h;pal.innerHTML=qs.map((x,i)=>'<button class="q '+(i===idx?'current':(st[x.id]||'unvisited'))+'" onclick="go('+i+')">'+(i+1)+'</button>').join('')}
async function choose(i){const q=qs[idx];ans[q.id]=i;st[q.id]='answered';await sb.from('test_answers').upsert({attempt_id:attempt.id,question_id:q.id,selected_answer:i,is_skipped:false},{onConflict:'attempt_id,question_id'});render()}
async function skip(){const q=qs[idx];st[q.id]='skipped';await sb.from('test_answers').upsert({attempt_id:attempt.id,question_id:q.id,selected_answer:null,is_skipped:true},{onConflict:'attempt_id,question_id'});next()}
function next(){if(idx<qs.length-1)idx++;render()}function prev(){if(idx>0)idx--;render()}function go(i){idx=i;render()}
async function submitTest(){if(!confirm('Final Submit करें?'))return;const {data,error}=await sb.rpc('submit_test_attempt',{p_attempt_id:attempt.id});if(error){alert(error.message);return}const r=Array.isArray(data)?data[0]:data;document.querySelector('.testgrid').classList.add('hidden');result.innerHTML='<div class="card"><h2>Result</h2><p>Score: '+r.score+'</p><p>Percentage: '+r.percentage+'%</p><p>Correct: '+r.correct_count+'</p><a class="btn blue" href="student.html">Dashboard</a></div>'}
async function load(){user=await requireAuth();if(!user)return;({data:test}=await sb.from('tests').select('*').eq('id',id).single());({data:qs=[]}=await sb.from('test_questions').select('*').eq('test_id',id).order('question_order'));let {data:a}=await sb.from('test_attempts').select('*').eq('test_id',id).eq('user_id',user.id).eq('status','in_progress').maybeSingle();if(!a){const r=await sb.from('test_attempts').insert({test_id:id,user_id:user.id,attempt_no:1}).select().single();a=r.data}attempt=a;render()}
load();
</script></body></html>
