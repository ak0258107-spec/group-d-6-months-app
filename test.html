<!doctype html><html lang="hi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mock Test</title><link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="common.js"></script></head><body>
<header class="topbar"><div class="topbar-inner"><div class="brand">Mock Test<small id="testTitle"></small></div><span id="timer" class="badge badge-orange"></span></div></header>
<main class="container"><div id="testArea" class="test-layout"><div class="card question-card"><div id="questionBox">Loading...</div><div class="test-nav"><button class="btn btn-blue" onclick="prevQ()">Previous</button><button class="btn btn-orange" onclick="skipQ()">Skip</button><button class="btn btn-green" onclick="nextQ()">Next</button><button class="btn btn-red" onclick="submitTest()">Submit Test</button></div></div><aside class="card"><h3>Status</h3><div id="palette" class="palette"></div><p class="muted small">Blue=current • Green=answered • Orange=skipped • Gray=unvisited</p></aside></div><div id="resultBox" class="hidden"></div></main><script src="test.js"></script></body></html>
