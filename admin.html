<!doctype html><html lang="hi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="common.js"></script></head><body><div class="admin"><nav class="side"><a onclick="tab('dash')">Dashboard</a><a onclick="tab('schedule')">90 Days</a><a onclick="tab('tests')">Tests</a><a onclick="tab('pdf')">PDF Upload</a><a onclick="logout()">Logout</a></nav><main class="main"><section id="dash"><h1>Admin Dashboard</h1><div id="kpi" class="card"></div></section><section id="schedule" class="hidden"><h1>Schedule</h1><div id="sched"></div></section><section id="tests" class="hidden"><h1>Create Mixed Test</h1><div class="card"><input id="testName" placeholder="Test Name"><input id="testTime" type="number" value="30" placeholder="Minutes"><textarea id="qjson" placeholder="Questions JSON paste करें"></textarea><button class="btn green" onclick="createTest()">Create & Publish</button></div><div id="testList"></div></section><section id="pdf" class="hidden"><h1>PDF Upload</h1><div class="card"><input id="pdfTitle" placeholder="PDF Title"><select id="pdfDay"></select><input id="pdfFile" type="file" accept="application/pdf"><button class="btn blue" onclick="uploadPdf()">Upload PDF</button></div></section></main></div><script>
let me;function tab(n){['dash','schedule','tests','pdf'].forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==n))}
async function guard(){me=await requireAuth();if(!me)return false;const p=await getProfile(me.id);if(p?.role!=='admin'){alert('Admin access required');location.href='student.html';return false}return true}
async function init(){if(!(await guard()))return;const a=await sb.from('profiles').select('*',{count:'exact',head:true}).eq('role','student');const b=await sb.from('tests').select('*',{count:'exact',head:true});kpi.innerHTML='<h2>Students: '+(a.count||0)+'</h2><h2>Tests: '+(b.count||0)+'</h2>';loadSchedule();loadTests();loadDays()}
async function loadSchedule(){const {data:d=[]}=await sb.from('schedule_days').select('*').order('day_number');const {data:t=[]}=await sb.from('daily_targets').select('*').order('target_order');const g={};t.forEach(x=>(g[x.schedule_day_id]??=[]).push(x));sched.innerHTML=d.map(x=>'<div class="card"><b>Day '+x.day_number+'</b>'+(g[x.id]||[]).map(y=>'<div class="target"><b>'+esc(y.subject)+':</b> '+esc(y.topic)+'</div>').join('')+'</div>').join('')}
async function loadTests(){const {data:t=[]}=await sb.from('tests').select('*').order('created_at',{ascending:false});testList.innerHTML=t.map(x=>'<div class="item"><b>'+esc(x.title)+'</b> — '+esc(x.status)+'</div>').join('')}
async function loadDays(){const {data:d=[]}=await sb.from('schedule_days').select('id,day_number,day_date').order('day_number');pdfDay.innerHTML=d.map(x=>'<option value="'+x.id+'">Day '+x.day_number+' — '+fmtDate(x.day_date)+'</option>').join('')}
async function createTest(){let qs;try{qs=JSON.parse(qjson.value)}catch{alert('Invalid JSON');return}const {data:t,error}=await sb.from('tests').insert({batch_id:APP_CONFIG.BATCH_ID,title:testName.value,total_questions:qs.length,total_marks:qs.reduce((a,q)=>a+(q.marks||1),0),time_limit_minutes:+testTime.value||null,status:'published',test_type:'daily',created_by:me.id}).select().single();if(error){alert(error.message);return}for(let i=0;i<qs.length;i++){const q=qs[i],{correct_answer,explanation,...rest}=q;const {data:r,error:e}=await sb.from('test_questions').insert({test_id:t.id,question_order:i+1,marks:q.marks||1,difficulty:q.difficulty||'normal',question_type:q.question_type,question_text:q.question_text,options:q.options||[],statements:q.statements||null,assertion_text:q.assertion_text||null,reason_text:q.reason_text||null,list_a:q.list_a||null,list_b:q.list_b||null,sequence_items:q.sequence_items||null,subject:q.subject||null,topic:q.topic||null}).select().single();if(e){alert(e.message);return}await sb.from('test_question_keys').insert({question_id:r.id,correct_answer:correct_answer,explanation:explanation||null})}alert('Test publish हो गया');loadTests()}
async function uploadPdf(){const f=pdfFile.files[0];if(!f){alert('PDF चुनें');return}const path=pdfDay.value+'/'+Date.now()+'-'+f.name.replace(/[^a-zA-Z0-9._-]/g,'_');const r=await sb.storage.from('study-pdfs').upload(path,f,{contentType:'application/pdf'});if(r.error){alert(r.error.message);return}const x=await sb.from('study_materials').insert({schedule_day_id:pdfDay.value,title:pdfTitle.value||f.name,material_type:'pdf',storage_path:path,file_size_bytes:f.size,mime_type:'application/pdf',status:'published',uploaded_by:me.id,published_at:new Date().toISOString()});if(x.error){alert(x.error.message);return}alert('PDF upload हो गई')}
init();
</script></body></html>
